name: tests
on: [push, pull_request]
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - name: Run every problem's test suite
        run: |
          set -e
          for d in problems/*/; do
            if [ -d "$d/tests" ]; then
              echo "== $d =="
              (cd "$d" && pytest tests/ -q)
            fi
          done
